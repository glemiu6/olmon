# .github/workflows/release.yaml
name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ----------------------------
  # Build binaries
  # ----------------------------
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: olmon-linux-x86_64
          - os: macos-latest
            name: olmon-macos-arm64


    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install pyinstaller platformdirs rich httpx

      - name: Build binary
        run: pyinstaller --onefile olmon/main.py --name ${{ matrix.name }}

      - name: Upload artifact (Unix)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}


  # ----------------------------
  # Publish to PyPI
  # ----------------------------
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies and build
        run: |
          uv sync --dev
          uv run python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1


  # ----------------------------
  # Create GitHub Release + attach binaries
  # ----------------------------
  github-release:
    name: GitHub Release
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}